app = "contacts-admin-crisis-2026"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DATA_PATH = "/data/data.json"
  ALLOWED_ORIGINS = "https://mande-youth.github.io,http://localhost:3000,http://127.0.0.1:3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "contacts_data"
  destination = "/data"
